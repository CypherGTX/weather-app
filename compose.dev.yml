name: cypher-weather-app

services:

  frontend:
    build: !reset null
    image: node:current-alpine
    container_name: wapp-frontend-dev
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev"
    ports:
      - "5173:5173"
    environment:
      NODE_ENV: development
    networks:
      - internal-net

  backend:
    build: !reset null
    image: node:current-alpine
    container_name: wapp-backend-dev
    working_dir: /app
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev"
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      USE_CORS: "true"
    networks:
      - internal-net

volumes:
  frontend_node_modules:
  backend_node_modules:
